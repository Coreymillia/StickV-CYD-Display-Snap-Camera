; StickVCam — C3 Super Mini Relay
; Connects to CYD SoftAP, receives JPEG over UART, serves /latest.jpg

[env:esp32-c3-supermini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
